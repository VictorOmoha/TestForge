version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: testforge-postgres
    environment:
      POSTGRES_DB: testforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: testforge-mongodb
    environment:
      MONGO_INITDB_DATABASE: testforge
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: testforge-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:

